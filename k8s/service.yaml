apiVersion: v1
kind: Service
metadata:
  name: flask-app-service
  namespace: default
spec:
  selector:
    app: flask-app       # Matches pods with this label
  ports:
    - protocol: TCP
      port: 80           # Port the Service listens on
      targetPort: 5000   # Port on the pod
  type: ClusterIP        # Internal-only; Ingress will expose it externally
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: flask-app-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
    - host: flask-app.local   # Add this to /etc/hosts pointing to minikube ip
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: flask-app-service
                port:
                  number: 80
